services:
  client:
    build:
      context: ./Client/magic-stream-client
      # container_name: magic-stream-client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    restart: unless-stopped 
  server:
    depends_on:
      - db
    build:
      context: ./Server/MagicStreamServer
      # container_name: magic-stream-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SECRET_KEY: "${SECRET_KEY}"
      REFRESH_TOKEN_SECRET_KEY: "${REFRESH_TOKEN_SECRET_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      BASE_PROMPT_TEMPLATE: >
        return a response using one of these words: {rankings}. 
        The response should be a single word and should not contain any other text. 
        The response should be based on the following review:
      RECOMMENDED_MOVIE_LIMITS: "5"
      MONGODB_URI: "mongodb://host.docker.internal:27017"
      DATABASE_NAME: "MagicStreamApp"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"

    restart: unless-stopped
  db:
    image: mongo:6.0
    container_name: magic-stream-db
    ports:
      - "27017:27017"
    volumes:
      - movies:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 4
      start_period: 30s
    restart: unless-stopped

  seed:
    image: mongo:6.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed:/seed-data
    command: 
      mongosh mongodb://db:27017/MagicStreamApp /seed-data/seed.js  
    restart: "no"

volumes:
  movies: {}